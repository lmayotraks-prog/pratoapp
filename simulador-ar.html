<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Martin Prato - Simulador AR & 3D</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Base Styles -->
    <link rel="stylesheet" href="index.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: transparent; /* Allow canvas to show */
        }

        .simulador-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            padding-top: 80px; /* Space for navbar */
            /* Add blend mode so iframe background blends with animated particles */
            mix-blend-mode: lighten; 
        }

        .simulador-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Adjust navbar specifically for this page so it doesn't block interactions */
        .navbar {
            background: rgba(10, 10, 10, 0.95) !important;
        }
    </style>
</head>

<body class="dark-mode" data-theme="gold">
    <!-- Navigation -->
    <nav class="navbar glass-panel">
        <div class="nav-content">
            <a href="index.html" class="logo">
                <img src="material audiovisual martin prato/logos/Logo Martin blnaco.PNG" alt="Dr. Martin Prato"
                    class="nav-logo-img">
            </a>

            <!-- Mobile Menu Button -->
            <div class="mobile-menu-btn" id="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="nav-links" id="nav-links">
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="index.html#about" class="nav-link">Dr. Martin</a>
                <a href="index.html#store" class="nav-link">Sedes</a>
                <!-- Galería Dropdown -->
                <div class="dropdown" id="galeria-dropdown">
                    <a href="index.html#galeria" class="nav-link">Galería <i class="fas fa-chevron-down" style="font-size: 0.8em; margin-left: 5px;"></i></a>
                    <div class="dropdown-menu">
                        <a href="galeria/fotos.html" class="dropdown-item">Casos de Éxito</a>
                        <a href="galeria/videos.html" class="dropdown-item">Testimonios</a>
                        <a href="simulador-ar.html" class="dropdown-item active">Simulador AR & 3D</a>
                    </div>
                </div>
                <a href="index.html#vip-consultation" class="nav-link">Contacto</a>
            </div>
        </div>
    </nav>

    <!-- Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Simulator iframe -->
    <div class="simulador-container">
        <iframe src="https://webview.dental/demo/view/6d38b28e256d4af5adaf5619c5f2e0dc.html" class="simulador-iframe" allow="xr-spatial-tracking; fullscreen" allowfullscreen></iframe>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
        // Custom Cursor (optional for this page, disabled inside iframe anyway)
        
        // Mobile Menu Toggle Logic
        document.addEventListener('DOMContentLoaded', () => {
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const navLinks = document.getElementById('nav-links');
            const galeriaDropdown = document.getElementById('galeria-dropdown');

            if (mobileBtn) {
                mobileBtn.addEventListener('click', () => {
                    navLinks.classList.toggle('active');
                });
            }

            // Click-to-toggle dropdown on mobile instead of hover
            if (galeriaDropdown) {
                galeriaDropdown.addEventListener('click', (e) => {
                    if (window.innerWidth <= 768) {
                        e.preventDefault(); 
                        // Only prevent default if they clicked the main link, not sub-links
                        if(e.target.classList.contains('dropdown-item')) {
                            window.location.href = e.target.href;
                            return;
                        }
                        galeriaDropdown.classList.toggle('active');
                    }
                });
            }
        });
    </script>
</body>
</html>
